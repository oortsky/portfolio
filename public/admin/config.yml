backend:
  name: github
  repo: oortsky/portfolio
  branch: main
  base_url: http://localhost:5173/
  auth_endpoint: api/auth/github

site_url: http://localhost:5173/

publish_mode: editorial_workflow

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: posts
    label: Posts
    label_singular: Post
    folder: content/posts
    create: true
    slug: "{{slug}}"

    fields:
      - label: Title
        name: title
        widget: string

      - label: Description
        name: description
        widget: text

      - label: Date
        name: date
        widget: datetime
        default: "{{now}}"

      - label: Category
        name: category
        widget: string

      - label: Tags
        name: tags
        widget: list
        required: false

      - label: Featured
        name: featured
        widget: boolean
        default: false

      - label: Cover
        name: cover
        widget: image
        required: false

      - label: Content
        name: body
        widget: markdown

  - name: projects
    label: Projects
    label_singular: Project
    folder: content/projects
    create: true
    slug: "{{slug}}"

    fields:
      - label: Title
        name: title
        widget: string

      - label: Description
        name: description
        widget: text

      - label: Category
        name: category
        widget: string

      - label: Technologies
        name: technologies
        widget: list
        required: false

      - label: Status
        name: status
        widget: select
        options:
          - Planning
          - In Progress
          - Completed
          - Archived
        default: In Progress

      - label: Featured
        name: featured
        widget: boolean
        default: false

      - label: Repository
        name: repository
        widget: string
        required: false

      - label: Website
        name: website
        widget: string
        required: false

      - label: Cover
        name: cover
        widget: image
        required: false

      - label: Content
        name: body
        widget: markdown
